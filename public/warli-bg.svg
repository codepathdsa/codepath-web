      <path d="M0,10 Q25,2 50,10 Q75,18 100,10 Q125,2 150,10 Q175,18 200,10 Q225,2 250,10 Q275,18 300,10 Q325,2 350,10 Q375,18 400,10"/>
      <path d="M0,390 Q25,382 50,390 Q75,398 100,390 Q125,382 150,390 Q175,398 200,390 Q225,382 250,390 Q275,398 300,390 Q325,382 350,390 Q375,398 400,390"/>
